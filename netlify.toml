# Fwiends on Netlify: static site + the archivist functions.
# Enable the AI Gateway on this site (Site settings → AI) so the
# functions get ANTHROPIC_API_KEY / ANTHROPIC_BASE_URL injected —
# no keys to manage.
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
